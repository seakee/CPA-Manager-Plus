name: Demo and Docs Check

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/demo-docs-check.yml'
      - 'apps/docs/**'
      - 'apps/web/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  demo-docs:
    name: Demo and Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build demo site
        run: npm --workspace apps/web run build:demo:bundle
        env:
          VERSION: ci-demo

      - name: Build docs site
        run: npm run docs:build
